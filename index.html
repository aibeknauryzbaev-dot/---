<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Жұбын тап - Сан есімдер</title>
    <!-- Балаларға ыңғайлы, әдемі қаріп -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* НЕГІЗГІ АЙНЫМАЛЫЛАР ЖӘНЕ БАПТАУЛАР */
        :root {
            --primary-color: #ff6b6b;
            --secondary-color: #4ecdc4;
            --bg-gradient: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
            --card-bg-front: #ffffff;
            --card-bg-back: #ffe66d;
            --text-color: #2d3436;
            --success-color: #bcf5bc;
            --shadow: 0 8px 15px rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-color);
            padding: 20px;
        }

        /* ТАҚЫРЫП ЖӘНЕ СТАТИСТИКА */
        header {
            text-align: center;
            margin-bottom: 10px;
            width: 100%;
            max-width: 1200px;
        }

        h1 {
            font-size: 2.2rem;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            margin-bottom: 10px;
        }

        .stats-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 25px;
            border-radius: 15px;
            box-shadow: var(--shadow);
            margin-bottom: 10px;
            font-weight: 700;
            font-size: 1.2rem;
        }

        .player {
            padding: 5px 15px;
            border-radius: 10px;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .active-player {
            background-color: var(--primary-color);
            color: white;
            box-shadow: 0 4px 10px rgba(255, 107, 107, 0.4);
            border: 2px solid #ff4757;
            transform: scale(1.05);
        }

        .btn-restart {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            font-family: 'Nunito', sans-serif;
        }

        .btn-restart:hover {
            background-color: #ff5252;
            transform: scale(1.05);
        }

        .btn-restart:active {
            transform: scale(0.95);
        }

        /* ОЙЫН АЛАҢЫ (ТОР) */
        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(3, 1fr); /* 3 қатарға теңдей бөлу */
            gap: 20px;
            width: 100%;
            max-width: 1400px; /* Интерактивті тақтаға арналған кеңейтілген өлшем */
            height: calc(100vh - 180px); /* Экран биіктігіне толық сию үшін */
            min-height: 400px;
            perspective: 1000px; /* 3D эффект үшін маңызды */
        }

        /* КАРТОЧКАЛАР СТИЛІ */
        .card {
            width: 100%;
            height: 100%; /* Пропорцияны (aspect-ratio) алып тастап, ұяшықты толық толтырамыз */
            position: relative;
            cursor: pointer;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
        }

        .card:hover {
            transform: scale(1.03); /* Hover эффектісі */
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card.matched .card-front {
            background-color: var(--success-color);
            border: 3px solid #2ecc71;
            color: #27ae60;
        }

        /* Карточканың алдыңғы және артқы жақтары */
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden; /* Артқы жағын жасыру */
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(1.2rem, 3vmin, 2.5rem); /* Қаріп өлшемі экранға қарай динамикалық бейімделеді */
            font-weight: 800;
            box-shadow: var(--shadow);
            padding: 10px;
            text-align: center;
            word-wrap: break-word;
        }

        /* Карточканың жабық тұрған кезі (сұрақ белгісі бар жағы) */
        .card-back {
            background: var(--card-bg-back);
            background-image: radial-gradient(circle, #ffe66d 10%, #ffc371 100%);
            border: 4px solid #fff;
            color: #d35400;
            font-size: clamp(2rem, 6vmin, 5rem);
        }

        /* Карточканың ашық тұрған кезі (сөз жазылған жағы) */
        .card-front {
            background: var(--card-bg-front);
            transform: rotateY(180deg); /* Бастапқыда бұрылып тұрады */
            color: var(--primary-color);
            border: 2px solid #eee;
        }

        /* МОДАЛЬДЫ ТЕРЕЗЕ (ЖЕҢІС КЕЗІНДЕ) */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            z-index: 100;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            transform: scale(0.7);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 90%;
            width: 400px;
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .modal-content h2 {
            color: var(--primary-color);
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .modal-content p {
            font-size: 1.2rem;
            margin-bottom: 25px;
            color: #636e72;
        }

        .modal-btn {
            background: var(--secondary-color);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
            font-family: 'Nunito', sans-serif;
        }

        .modal-btn:hover {
            background: #38b2ac;
            transform: scale(1.05);
        }

        /* МОБИЛЬДІ БЕЙІМДЕЛУ (RESPONSIVE) */
        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .game-board {
                grid-template-columns: repeat(3, 1fr); /* Мобильдіде 3 баған */
                grid-template-rows: repeat(4, 1fr); /* Мобильдіде 4 қатар */
                gap: 10px;
                height: calc(100vh - 240px);
            }
            .card-face { font-size: 1rem; } /* Сөздер сию үшін қаріпті кішірейту */
            .stats-container {
                flex-direction: column;
                gap: 10px;
                padding: 10px;
            }
            .player {
                width: 100%;
                text-align: center;
            }
            .stats-container div {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Жұбын тап! 🧩</h1>
        <div class="stats-container">
            <div id="player1" class="player active-player">1-ойыншы: <span id="score1">0</span></div>
            <div id="player2" class="player">2-ойыншы: <span id="score2">0</span></div>
            <div>Уақыт: <span id="time">00:00</span></div>
            <button class="btn-restart" onclick="initGame()">Қайта бастау</button>
        </div>
    </header>

    <!-- Ойын алаңы -->
    <div class="game-board" id="gameBoard"></div>

    <!-- Модальды терезе (Жеңіс) -->
    <div class="modal-overlay" id="winModal">
        <div class="modal-content">
            <h2 id="winTitle">🎉 Құттықтаймыз! 🎉</h2>
            <p>1-ойыншы ұпайы: <strong id="finalScore1">0</strong></p>
            <p>2-ойыншы ұпайы: <strong id="finalScore2">0</strong></p>
            <p>Жалпы уақыт: <strong id="finalTime">00:00</strong></p>
            <button class="modal-btn" onclick="initGame()">Жаңа ойын</button>
        </div>
    </div>

    <script>
        // 1. ОЙЫН ДЕРЕКТЕРІ (Сөздер жұбы)
        const words = [
            { text: "Бір", pairId: 1 }, { text: "Бірінші", pairId: 1 },
            { text: "Бес", pairId: 2 }, { text: "Бесінші", pairId: 2 },
            { text: "Он", pairId: 3 }, { text: "Оныншы", pairId: 3 },
            { text: "Жиырма", pairId: 4 }, { text: "Жиырмасыншы", pairId: 4 },
            { text: "Жүз", pairId: 5 }, { text: "Жүзінші", pairId: 5 },
            { text: "Мың", pairId: 6 }, { text: "Мыңыншы", pairId: 6 }
        ];

        // 2. АЙНЫМАЛЫЛАРДЫ ЖАРИЯЛАУ
        let cards = [];
        let hasFlippedCard = false;
        let lockBoard = false;
        let firstCard, secondCard;
        let matchedPairs = 0;
        
        // Көп ойыншы режимі айнымалылары
        let scores = [0, 0]; // [1-ойыншы, 2-ойыншы]
        let currentPlayer = 0; // 0 немесе 1
        
        // Таймер айнымалылары
        let timer;
        let seconds = 0;
        let isTimerRunning = false;

        // DOM Элементтері
        const boardElement = document.getElementById('gameBoard');
        const player1El = document.getElementById('player1');
        const player2El = document.getElementById('player2');
        const score1El = document.getElementById('score1');
        const score2El = document.getElementById('score2');
        const timeElement = document.getElementById('time');
        const modal = document.getElementById('winModal');
        const winTitleElement = document.getElementById('winTitle');
        const finalScore1Element = document.getElementById('finalScore1');
        const finalScore2Element = document.getElementById('finalScore2');
        const finalTimeElement = document.getElementById('finalTime');

        // 3. ОЙЫНДЫ БАСТАУ ФУНКЦИЯСЫ
        function initGame() {
            // Бастапқы мәндерді қалпына келтіру
            clearInterval(timer);
            seconds = 0;
            matchedPairs = 0;
            scores = [0, 0];
            currentPlayer = 0;
            hasFlippedCard = false;
            lockBoard = false;
            firstCard = null;
            secondCard = null;
            isTimerRunning = false;

            // UI жаңарту
            score1El.textContent = "0";
            score2El.textContent = "0";
            player1El.classList.add('active-player');
            player2El.classList.remove('active-player');
            timeElement.textContent = "00:00";
            modal.classList.remove('active');
            boardElement.innerHTML = '';

            // Карточкаларды араластыру және жасау
            shuffleCards();
            createBoard();
        }

        // 4. КАРТОЧКАЛАРДЫ АРАЛАСТЫРУ (Fisher-Yates алгоритмі)
        function shuffleCards() {
            cards = [...words];
            for (let i = cards.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [cards[i], cards[j]] = [cards[j], cards[i]];
            }
        }

        // 5. ОЙЫН АЛАҢЫН ЖАСАУ (HTML генерациялау)
        function createBoard() {
            cards.forEach((cardData, index) => {
                const card = document.createElement('div');
                card.classList.add('card');
                card.dataset.pairId = cardData.pairId; // Жұбын тексеру үшін ID
                card.dataset.index = index; // Карточканың индексі

                // HTML құрылымы
                card.innerHTML = `
                    <div class="card-face card-front">${cardData.text}</div>
                    <div class="card-face card-back">❓</div>
                `;

                card.addEventListener('click', flipCard);
                boardElement.appendChild(card);
            });
        }

        // 6. ТАЙМЕР ФУНКЦИЯСЫ
        function startTimer() {
            if (isTimerRunning) return;
            isTimerRunning = true;
            timer = setInterval(() => {
                seconds++;
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                timeElement.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }, 1000);
        }

        // 7. КАРТОЧКА АШУ ЛОГИКАСЫ
        function flipCard() {
            // Егер тақта бұғатталған болса немесе сол карточканы қайта басса, ештеңе істемеу
            if (lockBoard) return;
            if (this === firstCard) return;

            // Алғашқы рет басылғанда таймерді қосу
            startTimer();

            this.classList.add('flipped');

            // Бірінші карточка
            if (!hasFlippedCard) {
                hasFlippedCard = true;
                firstCard = this;
                return;
            }

            // Екінші карточка
            secondCard = this;
            hasFlippedCard = false;

            checkForMatch();
        }

        // 8. СӘЙКЕСТІКТІ ТЕКСЕРУ
        function checkForMatch() {
            const isMatch = firstCard.dataset.pairId === secondCard.dataset.pairId;

            if (isMatch) {
                disableCards(); // Егер сәйкес келсе, ашық қалдыру
            } else {
                unflipCards();  // Егер сәйкес келмесе, жабу
            }
        }

        // 9. СӘЙКЕСТІК ТАБЫЛҒАНДА
        function disableCards() {
            // Click оқиғасын алып тастау
            firstCard.removeEventListener('click', flipCard);
            secondCard.removeEventListener('click', flipCard);
            
            // Жасыл түспен ерекшелеу
            firstCard.classList.add('matched');
            secondCard.classList.add('matched');

            // Ұпай қосу
            scores[currentPlayer]++;
            if (currentPlayer === 0) {
                score1El.textContent = scores[0];
            } else {
                score2El.textContent = scores[1];
            }

            resetBoard();
            matchedPairs++;

            // Жеңісті тексеру (Барлық 6 жұп табылса)
            if (matchedPairs === (words.length / 2)) {
                setTimeout(showWinModal, 600);
            }
        }

        // 10. СӘЙКЕСТІК ТАБЫЛМАҒАНДА
        function unflipCards() {
            lockBoard = true; // Басқа карточка басылмауы үшін тақтаны бұғаттау

            // 1 секундтан кейін карточкаларды жабу және кезекті ауыстыру
            setTimeout(() => {
                firstCard.classList.remove('flipped');
                secondCard.classList.remove('flipped');
                
                // Кезекті басқа ойыншыға беру
                currentPlayer = currentPlayer === 0 ? 1 : 0;
                if (currentPlayer === 0) {
                    player1El.classList.add('active-player');
                    player2El.classList.remove('active-player');
                } else {
                    player2El.classList.add('active-player');
                    player1El.classList.remove('active-player');
                }

                resetBoard();
            }, 1000);
        }

        // 11. АЙНЫМАЛЫЛАРДЫ БАСТАПҚЫ ҚАЛЫПҚА КЕЛТІРУ
        function resetBoard() {
            [hasFlippedCard, lockBoard] = [false, false];
            [firstCard, secondCard] = [null, null];
        }

        // 12. ЖЕҢІС ТЕРЕЗЕСІН КӨРСЕТУ
        function showWinModal() {
            clearInterval(timer); // Таймерді тоқтату
            
            let winnerText = "";
            if (scores[0] > scores[1]) {
                winnerText = "1-ойыншы жеңді! 🏆";
            } else if (scores[1] > scores[0]) {
                winnerText = "2-ойыншы жеңді! 🏆";
            } else {
                winnerText = "Тең түстіңіздер! 🤝";
            }
            
            winTitleElement.textContent = winnerText;
            finalScore1Element.textContent = scores[0];
            finalScore2Element.textContent = scores[1];
            finalTimeElement.textContent = timeElement.textContent;
            
            modal.classList.add('active'); // Модальды терезені шығару
        }

        // Ойынды бет жүктелгенде бірден бастау
        window.onload = initGame;

    </script>
</body>
</html>
